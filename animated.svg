<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="100%" height="100%">
      <defs>
        <!-- Background Grid -->
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
          <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"></path>
          <circle cx="40" cy="40" r="1.5" fill="#ffffff" opacity="0.1"></circle>
        </pattern>

        <!-- Microchip Background Pattern -->
        <pattern id="chip-bg" width="10" height="10" patternUnits="userSpaceOnUse">
          <rect width="10" height="10" fill="#090d16"></rect>
          <path d="M 0 0 L 10 10 M 10 0 L 0 10" stroke="#1f2937" stroke-width="0.5"></path>
        </pattern>

        <!-- Glow Filters -->
        <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="6" result="blur"></feGaussianBlur>
          <feMerge>
            <feMergeNode in="blur"></feMergeNode>
            <feMergeNode in="blur"></feMergeNode>
            <feMergeNode in="SourceGraphic"></feMergeNode>
          </feMerge>
        </filter>

        <filter id="subtle-glow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur stdDeviation="3" result="blur"></feGaussianBlur>
          <feMerge>
            <feMergeNode in="blur"></feMergeNode>
            <feMergeNode in="SourceGraphic"></feMergeNode>
          </feMerge>
        </filter>

        <filter id="ambient-glow" x="-50%" y="-50%" width="200%" height="200%">
          <feGaussianBlur stdDeviation="50"></feGaussianBlur>
        </filter>

        <!-- Gradients -->
        <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#F59E0B"></stop>
          <stop offset="50%" stop-color="#FBBF24"></stop>
          <stop offset="100%" stop-color="#F59E0B">
            <animate attributeName="stop-color" values="#F59E0B;#38BDF8;#F59E0B" dur="6s" repeatCount="indefinite"></animate>
          </stop>
        </linearGradient>

        <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#38BDF8" stop-opacity="0"></stop>
          <stop offset="10%" stop-color="#38BDF8"></stop>
          <stop offset="90%" stop-color="#F59E0B"></stop>
          <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"></stop>
        </linearGradient>
        
        <linearGradient id="core-grad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#38BDF8"></stop>
          <stop offset="100%" stop-color="#A855F7"></stop>
        </linearGradient>

        <!-- Circuit Trace Paths for Data Packets -->
        <path id="trace-tl" d="M 660 160 L 590 90 L 565 90"></path>
        <path id="trace-tr" d="M 740 160 L 810 90 L 835 90"></path>
        <path id="trace-bl" d="M 660 240 L 590 310 L 565 310"></path>
        <path id="trace-br" d="M 740 240 L 810 310 L 835 310"></path>
      </defs>

      <!-- Embedded CSS for Cinematic Text Animations -->
      <style>
        .text-small {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          font-size: 20px;
          font-weight: 400;
          fill: #8b949e;
          letter-spacing: 0.5px;
        }
        .text-medium {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          font-size: 36px;
          font-weight: 700;
          fill: #f0f6fc;
          letter-spacing: -0.5px;
        }
        .text-hero {
          font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
          font-size: 82px;
          font-weight: 900;
          fill: url(#gold-grad);
          letter-spacing: -2px;
          font-style: italic;
        }
        .text-node {
          font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace;
          font-size: 11px;
          font-weight: 700;
          letter-spacing: 1px;
          fill: #c9d1d9;
        }

        .fade-in {
          opacity: 0;
          animation: fadeSlideUp 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        @keyframes fadeSlideUp {
          0% { opacity: 0; transform: translateY(20px); }
          100% { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.5s; }
        .delay-2 { animation-delay: 1.2s; }
        .delay-3 { animation-delay: 2.5s; }
        .delay-4 { animation-delay: 3.2s; }
        .delay-5 { animation-delay: 4.5s; }
        
        .line-expand {
          stroke-dasharray: 400;
          stroke-dashoffset: 400;
          animation: drawLine 1.5s cubic-bezier(0.8, 0, 0.2, 1) forwards;
          animation-delay: 4.8s;
        }
        @keyframes drawLine {
          to { stroke-dashoffset: 0; }
        }
      </style>

      <!-- Base Canvas Background -->
      <rect width="900" height="400" fill="#0d1117"></rect>
      <rect width="900" height="400" fill="url(#grid)"></rect>

      <!-- Ambient Lighting -->
      <circle cx="700" cy="200" r="140" fill="#0c4a6e" opacity="0.4" filter="url(#ambient-glow)"></circle>
      <circle cx="700" cy="200" r="80" fill="#4c1d95" opacity="0.4" filter="url(#ambient-glow)"></circle>
      <circle cx="200" cy="200" r="180" fill="#0f172a" opacity="0.3" filter="url(#ambient-glow)"></circle>

      <!-- ========================================== -->
      <!-- LEFT SIDE: CINEMATIC TYPOGRAPHY            -->
      <!-- ========================================== -->
      <g transform="translate(50, 0)">
        <text x="0" y="90" class="text-small fade-in delay-1">I'm humble enough to know</text>
        <text x="0" y="140" class="text-medium fade-in delay-2">I'm replaceable at work.</text>
        <text x="0" y="225" class="text-small fade-in delay-3">But I'm confident enough to know</text>
        <text x="0" y="275" class="text-medium fade-in delay-4">that it would take...</text>
        <text x="0" y="360" class="text-hero fade-in delay-5" filter="url(#subtle-glow)">4 PEOPLE.</text>
        <line x1="5" y1="380" x2="385" y2="380" stroke="url(#line-grad)" stroke-width="4" stroke-linecap="round" class="line-expand" filter="url(#neon-glow)"></line>
      </g>

      <!-- ========================================== -->
      <!-- RIGHT SIDE: THE QUANTUM PROCESSOR CORE     -->
      <!-- ========================================== -->

      <!-- Background Faint Hex Strings -->
      <g class="text-node" fill="#1f2937" opacity="0.5">
        <text x="580" y="140">0x00F8A</text>
        <text x="750" y="270">sys.init()</text>
        <text x="600" y="270">THREAD_04</text>
        <text x="750" y="140">0x228B1</text>
      </g>

      <!-- Circuit Board Traces connecting Core to Nodes -->
      <g fill="none" stroke-width="2" opacity="0.6">
        <!-- Top Left -->
        <path d="M 660 160 L 590 90 L 565 90" stroke="#3178C6" stroke-linejoin="miter"></path>
        <path d="M 650 170 L 590 110 L 570 110" stroke="#3178C6" stroke-width="1" opacity="0.3"></path>
        <!-- Top Right -->
        <path d="M 740 160 L 810 90 L 835 90" stroke="#ED8B00" stroke-linejoin="miter"></path>
        <path d="M 750 170 L 810 110 L 830 110" stroke="#ED8B00" stroke-width="1" opacity="0.3"></path>
        <!-- Bottom Left -->
        <path d="M 660 240 L 590 310 L 565 310" stroke="#06B6D4" stroke-linejoin="miter"></path>
        <path d="M 650 230 L 590 290 L 570 290" stroke="#06B6D4" stroke-width="1" opacity="0.3"></path>
        <!-- Bottom Right -->
        <path d="M 740 240 L 810 310 L 835 310" stroke="#A855F7" stroke-linejoin="miter"></path>
        <path d="M 750 230 L 810 290 L 830 290" stroke="#A855F7" stroke-width="1" opacity="0.3"></path>
      </g>

      <!-- Animated Data Packets Flowing Outward -->
      <g filter="url(#neon-glow)">
        <circle r="3" fill="#3178C6"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#trace-tl"></mpath></animateMotion></circle>
        <circle r="3" fill="#ED8B00"><animateMotion dur="2.5s" repeatCount="indefinite" begin="0.5s"><mpath href="#trace-tr"></mpath></animateMotion></circle>
        <circle r="3" fill="#06B6D4"><animateMotion dur="1.8s" repeatCount="indefinite" begin="0.2s"><mpath href="#trace-bl"></mpath></animateMotion></circle>
        <circle r="3" fill="#A855F7"><animateMotion dur="2.2s" repeatCount="indefinite" begin="0.8s"><mpath href="#trace-br"></mpath></animateMotion></circle>
      </g>

      <!-- Central CPU Core Structure -->
      <g>
        <!-- Floating/Breathing Animation -->
        <animateTransform attributeName="transform" type="translate" values="0 0; 0 -4; 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.42 0 0.58 1; 0.42 0 0.58 1"></animateTransform>

        <!-- Outer Ring -->
        <circle cx="700" cy="200" r="75" fill="none" stroke="#1f2937" stroke-width="2"></circle>
        <!-- Spinning Tech Ring -->
        <circle cx="700" cy="200" r="65" fill="none" stroke="url(#core-grad)" stroke-width="2" stroke-dasharray="20,10,5,10" opacity="0.7">
          <animateTransform attributeName="transform" type="rotate" from="0 700 200" to="360 700 200" dur="15s" repeatCount="indefinite"></animateTransform>
        </circle>
        <!-- Counter-Spinning Inner Ring -->
        <circle cx="700" cy="200" r="58" fill="none" stroke="#38BDF8" stroke-width="1" stroke-dasharray="4,8" opacity="0.5">
          <animateTransform attributeName="transform" type="rotate" from="360 700 200" to="0 700 200" dur="25s" repeatCount="indefinite"></animateTransform>
        </circle>

        <!-- The Microchip Base (Octagon) -->
        <polygon points="665,145 735,145 755,165 755,235 735,255 665,255 645,235 645,165" fill="url(#chip-bg)" stroke="#30363d" stroke-width="3"></polygon>
        
        <!-- Glowing Core Border -->
        <polygon points="668,150 732,150 750,168 750,232 732,250 668,250 650,232 650,168" fill="none" stroke="url(#core-grad)" stroke-width="2" filter="url(#subtle-glow)">
          <animate attributeName="stroke-opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"></animate>
        </polygon>

        <!-- Inner Chip Logic Geometry -->
        <rect x="670" y="170" width="60" height="60" rx="8" fill="#0d1117" stroke="#4b5563" stroke-width="1.5"></rect>
        <rect x="675" y="175" width="50" height="50" rx="6" fill="#010409" stroke="#38BDF8" stroke-width="1" opacity="0.5"></rect>
        
        <!-- Core CPU Pulsing Node -->
        <circle cx="700" cy="200" r="14" fill="#090d16" stroke="url(#core-grad)" stroke-width="3" filter="url(#neon-glow)">
          <animate attributeName="r" values="12;15;12" dur="2s" repeatCount="indefinite"></animate>
        </circle>
        
        <!-- Core Identifier Text -->
        <text x="700" y="204" fill="#ffffff" font-family="sans-serif" font-size="10" font-weight="900" text-anchor="middle" letter-spacing="1">FEI</text>

        <!-- Chip Connection Pins (Left & Right edges) -->
        <g fill="#4b5563">
          <!-- Left Pins -->
          <rect x="640" y="170" width="5" height="4"></rect><rect x="640" y="180" width="5" height="4"></rect>
          <rect x="640" y="190" width="5" height="4"></rect><rect x="640" y="200" width="5" height="4"></rect>
          <rect x="640" y="210" width="5" height="4"></rect><rect x="640" y="220" width="5" height="4"></rect>
          <!-- Right Pins -->
          <rect x="755" y="170" width="5" height="4"></rect><rect x="755" y="180" width="5" height="4"></rect>
          <rect x="755" y="190" width="5" height="4"></rect><rect x="755" y="200" width="5" height="4"></rect>
          <rect x="755" y="210" width="5" height="4"></rect><rect x="755" y="220" width="5" height="4"></rect>
        </g>
      </g>

      <!-- ========================================== -->
      <!-- THE 4 REPLACEMENTS (The Coprocessor Nodes) -->
      <!-- ========================================== -->

      <!-- Node 1: Frontend Developer (Top Left) -->
      <g>
        <circle cx="550" cy="90" r="26" fill="#010409" stroke="#3178C6" stroke-width="2"></circle>
        <path d="M 550,55 A 35,35 0 0,1 585,90" fill="none" stroke="#3178C6" stroke-width="2" filter="url(#subtle-glow)">
           <animateTransform attributeName="transform" type="rotate" from="0 550 90" to="360 550 90" dur="4s" repeatCount="indefinite"></animateTransform>
        </path>
        <text x="550" y="94" fill="#ffffff" font-family="sans-serif" font-size="12" font-weight="900" text-anchor="middle">TS</text>
        <rect x="525" y="110" width="50" height="18" rx="9" fill="#161b22" stroke="#30363d"></rect>
        <text x="550" y="122" class="text-node" text-anchor="middle">FRONTEND</text>
      </g>

      <!-- Node 2: Backend Developer (Top Right) -->
      <g>
        <circle cx="850" cy="90" r="26" fill="#010409" stroke="#ED8B00" stroke-width="2"></circle>
        <path d="M 850,55 A 35,35 0 0,1 885,90" fill="none" stroke="#ED8B00" stroke-width="2" filter="url(#subtle-glow)">
           <animateTransform attributeName="transform" type="rotate" from="360 850 90" to="0 850 90" dur="5s" repeatCount="indefinite"></animateTransform>
        </path>
        <g transform="translate(838, 77)">
          <path d="M 6,18 L 18,18 C 20,18 20,20 18,20 L 6,20 C 4,20 4,18 6,18 Z" fill="#ED8B00"></path>
          <path d="M 8,9 L 18,9 C 18,14 16,18 13,18 C 10,18 8,14 8,9 Z" fill="none" stroke="#ED8B00" stroke-width="1.5"></path>
          <path d="M 18,10 Q 22,10 20,13 T 18,15" fill="none" stroke="#ED8B00" stroke-width="1.2"></path>
          <path d="M 11,6 Q 12,3 11,1" fill="none" stroke="#ED8B00" stroke-width="1.2" stroke-linecap="round"></path>
          <path d="M 15,6 Q 16,3 15,1" fill="none" stroke="#ED8B00" stroke-width="1.2" stroke-linecap="round"></path>
        </g>
        <rect x="825" y="110" width="50" height="18" rx="9" fill="#161b22" stroke="#30363d"></rect>
        <text x="850" y="122" class="text-node" text-anchor="middle">BACKEND</text>
      </g>

      <!-- Node 3: UI/UX Architect (Bottom Left) -->
      <g>
        <circle cx="550" cy="310" r="26" fill="#010409" stroke="#06B6D4" stroke-width="2"></circle>
        <path d="M 550,275 A 35,35 0 0,1 585,310" fill="none" stroke="#06B6D4" stroke-width="2" filter="url(#subtle-glow)">
           <animateTransform attributeName="transform" type="rotate" from="0 550 310" to="360 550 310" dur="4.5s" repeatCount="indefinite"></animateTransform>
        </path>
        <g transform="translate(538, 298)">
          <path d="M 5,10 C 5,6 9,5 11,7 C 13,9 15,11 18,9 C 18,13 14,14 12,12 C 10,10 7,8 5,10 Z" fill="#06B6D4"></path>
          <path d="M 10,15 C 10,11 14,10 16,12 C 18,14 21,16 23,14 C 23,18 19,19 17,17 C 15,15 12,13 10,15 Z" fill="#06B6D4" opacity="0.8" transform="translate(-4, -2)"></path>
        </g>
        <rect x="525" y="330" width="50" height="18" rx="9" fill="#161b22" stroke="#30363d"></rect>
        <text x="550" y="342" class="text-node" text-anchor="middle">UI / UX</text>
      </g>

      <!-- Node 4: AI & State Engineer (Bottom Right) -->
      <g>
        <circle cx="850" cy="310" r="26" fill="#010409" stroke="#A855F7" stroke-width="2"></circle>
        <path d="M 850,275 A 35,35 0 0,1 885,310" fill="none" stroke="#A855F7" stroke-width="2" filter="url(#subtle-glow)">
           <animateTransform attributeName="transform" type="rotate" from="360 850 310" to="0 850 310" dur="3.5s" repeatCount="indefinite"></animateTransform>
        </path>
        <g transform="translate(838, 298)">
          <circle cx="12" cy="12" r="2.5" fill="#A855F7"></circle>
          <ellipse cx="12" cy="12" rx="8" ry="3" fill="none" stroke="#A855F7" stroke-width="1.5" transform="rotate(30 12 12)"></ellipse>
          <ellipse cx="12" cy="12" rx="8" ry="3" fill="none" stroke="#A855F7" stroke-width="1.5" transform="rotate(90 12 12)"></ellipse>
          <ellipse cx="12" cy="12" rx="8" ry="3" fill="none" stroke="#A855F7" stroke-width="1.5" transform="rotate(150 12 12)"></ellipse>
        </g>
        <rect x="815" y="330" width="70" height="18" rx="9" fill="#161b22" stroke="#30363d"></rect>
        <text x="850" y="342" class="text-node" text-anchor="middle">ARCHITECT</text>
      </g>

    </svg>
